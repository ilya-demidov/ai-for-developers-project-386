services:
  mock:
    build: ./mock
    ports:
      - "8080:8080"
    volumes:
      - ./spec/tsp-output:/spec:ro
    networks:
      - minical-network

  web:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_API_PROXY_TARGET=http://mock:8080
      - VITE_HOST_NAME=Tota
      - VITE_HOST_ROLE=Host
      - VITE_WORK_START_HOUR=9
      - VITE_WORK_END_HOUR=18
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - minical-network
    depends_on:
      - mock

networks:
  minical-network:
    driver: bridge
