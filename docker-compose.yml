services:
  mock:
    build: ./mock
    ports:
      - "8080:8080"
    volumes:
      - ./spec/tsp-output:/spec:ro
    networks:
      - minical-network
    profiles:
      - mock

  api:
    build: ./backend
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - minical-network

  web:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://api:8080}
      - VITE_HOST_NAME=Tota
      - VITE_HOST_ROLE=Host
      - VITE_WORK_START_HOUR=9
      - VITE_WORK_END_HOUR=18
      - VITE_HOST_TIMEZONE=Europe/Moscow
      - VITE_BOOKING_WINDOW_DAYS=14
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - minical-network
    depends_on:
      - api

networks:
  minical-network:
    driver: bridge
