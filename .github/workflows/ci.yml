name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build backend
        working-directory: backend
        run: dotnet build

  e2e-real:
    name: E2E Real
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start docker compose stack
        run: docker compose up --build -d

      - name: Wait for web and api
        shell: bash
        run: |
          set -euo pipefail

          for i in {1..90}; do
            if curl -fsS http://localhost:5173 > /dev/null; then
              echo "Web is ready"
              break
            fi
            if [[ "$i" -eq 90 ]]; then
              echo "Web is not ready in time"
              exit 1
            fi
            sleep 2
          done

          for i in {1..90}; do
            if curl -fsS http://localhost:8081/api/event-types > /dev/null; then
              echo "API is ready"
              break
            fi
            if [[ "$i" -eq 90 ]]; then
              echo "API is not ready in time"
              exit 1
            fi
            sleep 2
          done

      - name: Run e2e real tests
        working-directory: frontend
        run: npm run e2e:real

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-real-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Dump docker compose logs
        if: always()
        run: docker compose logs --no-color || true

      - name: Stop docker compose
        if: always()
        run: docker compose down -v || true
