openapi: 3.0.0
info:
  title: Mini Cal API
  version: 0.0.0
tags: []
paths:
  /api/admin/bookings:
    get:
      operationId: AdminRoutes_listBookings
      description: List all upcoming bookings across all event types. Sorted by startUtc ascending. Optional query parameters from and to filter the date range.
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          explode: false
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
              example:
                - id: bk-1
                  eventTypeId: et-1
                  eventTypeName: Consultation
                  startUtc: '2025-06-01T09:00:00Z'
                  endUtc: '2025-06-01T09:30:00Z'
                  guestName: Alice Johnson
                  guestEmail: alice@example.com
                  createdAtUtc: '2025-05-20T08:00:00Z'
  /api/admin/event-types:
    get:
      operationId: AdminRoutes_listEventTypes
      description: List all event types
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
              example:
                - id: et-1
                  name: Consultation
                  durationMinutes: 30
    post:
      operationId: AdminRoutes_createEventType
      description: Create a new event type
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
              example:
                id: et-1
                name: Consultation
                durationMinutes: 30
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventTypeCreate'
            example:
              name: Consultation
              durationMinutes: 30
  /api/admin/event-types/{id}:
    get:
      operationId: AdminRoutes_getEventType
      description: Get a single event type by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
              example:
                id: et-1
                name: Consultation
                durationMinutes: 30
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      operationId: AdminRoutes_updateEventType
      description: Update an existing event type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
              example:
                id: et-1
                name: Consultation
                durationMinutes: 60
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventTypeUpdate'
            example:
              name: Consultation
              durationMinutes: 60
    delete:
      operationId: AdminRoutes_deleteEventType
      description: Delete an event type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/bookings:
    post:
      operationId: PublicRoutes_createBooking
      description: Create a new booking for a selected slot. The server calculates endUtc = startUtc + EventType.durationMinutes. Before saving, the server checks for overlaps with existing bookings (all event types) in a transaction to prevent race conditions. startUtc must fall within valid working hours and the 14-day booking window. Returns 409 Conflict if the slot is already taken. Returns 400 if startUtc is invalid (outside working hours, outside 14-day window, in the past). Returns 404 if eventTypeId does not exist.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: bk-1
                eventTypeId: et-1
                eventTypeName: Consultation
                startUtc: '2025-06-01T09:00:00Z'
                endUtc: '2025-06-01T09:30:00Z'
                guestName: Alice Johnson
                guestEmail: alice@example.com
                createdAtUtc: '2025-05-20T08:00:00Z'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreate'
            example:
              eventTypeId: et-1
              startUtc: '2025-06-01T09:00:00Z'
              guestName: Alice Johnson
              guestEmail: alice@example.com
  /api/event-types:
    get:
      operationId: PublicRoutes_listEventTypes
      description: List all event types available for booking (name, description, durationMinutes)
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
              example:
                - id: et-1
                  name: Consultation
                  durationMinutes: 30
  /api/event-types/{id}:
    get:
      operationId: PublicRoutes_getEventType
      description: Get details of a single event type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/event-types/{id}/slots:
    get:
      operationId: PublicRoutes_getSlots
      description: Get free booking slots for a given event type within the next 14 days. Slots are computed based on the event type duration, owner working hours (server config), and exclude any slots that overlap with existing bookings of any event type. All returned slots have duration equal to EventType.durationMinutes. Slots are sorted by startUtc ascending. If from or to are not provided, defaults to [now, now + 14 days). Returns 400 if from >= to or values are outside the 14-day window. Returns 404 if eventTypeId does not exist.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          explode: false
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Slot'
              example:
                - startUtc: '2025-06-01T09:00:00Z'
                  endUtc: '2025-06-01T09:30:00Z'
                  eventTypeId: et-1
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    Booking:
      type: object
      required:
        - id
        - eventTypeId
        - eventTypeName
        - startUtc
        - endUtc
        - guestName
        - guestEmail
        - createdAtUtc
      properties:
        id:
          type: string
          readOnly: true
        eventTypeId:
          type: string
        eventTypeName:
          type: string
          minLength: 1
          maxLength: 100
        startUtc:
          type: string
          format: date-time
          description: Start of the booking in UTC
        endUtc:
          type: string
          format: date-time
          description: End of the booking in UTC, calculated as startUtc + EventType.durationMinutes
        guestName:
          type: string
          minLength: 1
          maxLength: 100
        guestEmail:
          type: string
          description: Guest email address
        notes:
          type: string
          maxLength: 1000
        createdAtUtc:
          type: string
          format: date-time
          description: Creation timestamp in UTC
          readOnly: true
      example:
        id: bk-1
        eventTypeId: et-1
        eventTypeName: Consultation
        startUtc: '2025-06-01T09:00:00Z'
        endUtc: '2025-06-01T09:30:00Z'
        guestName: Alice Johnson
        guestEmail: alice@example.com
        createdAtUtc: '2025-05-20T08:00:00Z'
    BookingCreate:
      type: object
      required:
        - eventTypeId
        - startUtc
        - guestName
        - guestEmail
      properties:
        eventTypeId:
          type: string
        startUtc:
          type: string
          format: date-time
          description: Start of the booking in UTC. Must fall within a valid free slot.
        guestName:
          type: string
          minLength: 1
          maxLength: 100
        guestEmail:
          type: string
          description: Guest email address
        notes:
          type: string
          maxLength: 1000
    EventType:
      type: object
      required:
        - id
        - name
        - durationMinutes
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        durationMinutes:
          type: integer
          format: int32
          minimum: 5
          maximum: 480
      example:
        id: et-1
        name: Consultation
        durationMinutes: 30
    EventTypeCreate:
      type: object
      required:
        - name
        - durationMinutes
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        durationMinutes:
          type: integer
          format: int32
          minimum: 5
          maximum: 480
    EventTypeUpdate:
      type: object
      required:
        - name
        - durationMinutes
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        durationMinutes:
          type: integer
          format: int32
          minimum: 5
          maximum: 480
    Owner:
      type: object
      required:
        - id
        - name
        - timeZone
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 100
        timeZone:
          type: string
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    Slot:
      type: object
      required:
        - startUtc
        - endUtc
        - eventTypeId
      properties:
        startUtc:
          type: string
          format: date-time
          description: Start of the slot in UTC
        endUtc:
          type: string
          format: date-time
          description: End of the slot in UTC, calculated as startUtc + EventType.durationMinutes
        eventTypeId:
          type: string
      example:
        startUtc: '2025-06-01T09:00:00Z'
        endUtc: '2025-06-01T09:30:00Z'
        eventTypeId: et-1
servers:
  - url: http://localhost:8080
    description: Local development server
    variables: {}
